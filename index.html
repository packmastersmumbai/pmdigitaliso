<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pack Masters — ISO Document Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;--bg:#f8fafc;--bg2:#f1f5f9;
  --ink:#0f172a;--ink2:#334155;--ink3:#64748b;--ink4:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --blue:#2563eb;--blue2:#1d4ed8;--blue-soft:#eff6ff;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.05);
  --shadow-md:0 4px 12px rgba(15,23,42,.08),0 2px 4px rgba(15,23,42,.04);
  --mono:'JetBrains Mono','SF Mono',monospace;
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:0 24px;position:sticky;top:0;z-index:300;
  box-shadow:0 1px 0 var(--border),0 2px 8px rgba(15,23,42,.04);
}
.hdr-inner{max-width:1300px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#2563eb 0%,#7c3aed 100%);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:.7rem;letter-spacing:.05em;flex-shrink:0;
}
.hdr-name{font-size:.95rem;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.hdr-tagline{font-size:.68rem;color:var(--ink3);margin-top:1px}
.hdr-stds{display:flex;gap:4px}
.hdr-std{font-size:.6rem;font-weight:600;border-radius:4px;padding:2px 6px;font-family:var(--mono)}

/* ── STATS ── */
.stats{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px}
.stats-inner{max-width:1300px;margin:0 auto;display:flex;overflow-x:auto}
.stat{flex:1;min-width:80px;padding:10px 20px;border-right:1px solid var(--border);text-align:center}
.stat:last-child{border-right:none}
.stat b{display:block;font-size:1.35rem;font-weight:700;color:var(--blue);font-family:var(--mono);letter-spacing:-.02em}
.stat span{font-size:.6rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;display:block}

/* ── CHIPS ── */
.chips{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:6px;flex-wrap:wrap}
.chip{
  background:var(--cbg,#f1f5f9);color:var(--cfg,#475569);
  border:1.5px solid transparent;border-radius:20px;
  padding:4px 14px;font-size:.73rem;font-weight:600;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.chip.all{--cbg:#f1f5f9;--cfg:#475569}
.chip:hover{filter:brightness(.96);border-color:color-mix(in srgb,var(--cfg) 30%,transparent)}
.chip.on{
  background:var(--cfg);color:#fff;
  border-color:var(--cfg);
  box-shadow:0 2px 8px color-mix(in srgb,var(--cfg) 30%,transparent);
}

/* ── TOOLBAR ── */
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 24px}
.toolbar-inner{max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.sw{position:relative;flex:1}
.sw input{
  width:100%;padding:9px 36px 9px 38px;
  background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:.875rem;color:var(--ink);outline:none;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
.sw input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.sw input::placeholder{color:var(--ink4)}
.sw .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink4);pointer-events:none;font-size:.88rem}
.sw .sx{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink4);font-size:.85rem;display:none;padding:2px;line-height:1}
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.frow select{
  padding:7px 12px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-size:.8rem;color:var(--ink);cursor:pointer;outline:none;flex:1;min-width:140px;
  transition:border-color .15s;
}
.frow select:focus{border-color:var(--blue)}
.sort-btn{
  padding:7px 14px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-size:.78rem;color:var(--ink2);font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;
}
.sort-btn:hover{border-color:var(--blue);color:var(--blue)}
.rst{
  padding:7px 16px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius-sm);font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:background .15s;
}
.rst:hover{background:var(--blue2)}

/* ── RESULT BAR ── */
.rbar{padding:7px 24px;background:var(--bg);border-bottom:1px solid var(--border)}
.rbar-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.rbar span{font-size:.72rem;color:var(--ink3)}
.rbar-active{color:var(--blue)!important;font-weight:500}

/* ── MAIN ── */
.main{max-width:1300px;margin:0 auto;padding:20px 24px 60px}

/* ── CATEGORY SECTIONS ── */
.cat-sec{
  margin-bottom:10px;background:var(--white);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
.cat-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;cursor:pointer;user-select:none;
  transition:background .12s;
}
.cat-hdr:hover{background:var(--bg)}
.cat-hdr-l{display:flex;align-items:center;gap:10px}
.cat-pill{
  font-size:.65rem;font-weight:700;border-radius:6px;
  padding:3px 8px;font-family:var(--mono);letter-spacing:.03em;
}
.cat-name{font-size:.88rem;font-weight:600;color:var(--ink)}
.cat-n{
  font-family:var(--mono);font-size:.68rem;color:var(--ink3);
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:1px 8px;
}
.cat-arrow{color:var(--ink4);font-size:.7rem;transition:transform .2s;margin-left:4px}
.cat-sec.open .cat-arrow{transform:rotate(180deg)}
.cat-body{display:none;border-top:1px solid var(--border)}
.cat-sec.open .cat-body{display:block}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
thead th{
  background:var(--bg);color:var(--ink3);font-size:.64rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;padding:8px 16px;
  border-bottom:1px solid var(--border2);text-align:left;white-space:nowrap;
  cursor:pointer;user-select:none;transition:color .12s;
}
thead th:hover{color:var(--blue)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;position:relative}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--blue-soft)}
tbody tr:hover .qr-cell{opacity:1;pointer-events:auto}
td{padding:10px 16px;vertical-align:middle;font-size:.83rem}
td.code-cell{font-family:var(--mono);font-size:.73rem;color:var(--ink3);white-space:nowrap;width:160px}
td.title-cell{color:var(--ink);font-weight:500;}
td.title-cell a{color:inherit;text-decoration:none}
td.title-cell a:hover{color:var(--blue)}
td.clause-cell a{
  font-family:var(--mono);font-size:.72rem;color:var(--blue);
  font-weight:600;text-decoration:none;
}
td.clause-cell a:hover{text-decoration:underline}
.std-pill{
  display:inline-block;font-size:.62rem;font-weight:700;
  border-radius:5px;padding:2px 8px;font-family:var(--mono);
}

/* ── QR CELL ── */
/* QR modal */
.qr-modal{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(15,23,42,.55);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.qr-modal.show{display:flex}
.qr-box{
  background:#fff;border-radius:16px;padding:28px;
  text-align:center;box-shadow:0 24px 48px rgba(15,23,42,.2);
  max-width:300px;width:90%;
}
.qr-box img{width:200px;height:200px;border-radius:8px;border:1px solid var(--border)}
.qr-code-label{font-family:var(--mono);font-size:.8rem;color:var(--ink3);margin-top:12px;font-weight:500}
.qr-title-label{font-size:.85rem;color:var(--ink);font-weight:600;margin-top:4px;line-height:1.35}
.qr-url{font-size:.68rem;color:var(--ink4);margin-top:8px;word-break:break-all}
.qr-close{
  margin-top:16px;padding:7px 20px;background:var(--blue);color:#fff;
  border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;
}
.qr-close:hover{background:var(--blue2)}

.no-results{padding:56px;text-align:center;color:var(--ink3);font-size:.88rem}

/* ── QR CELL bigger ── */
.qr-cell{width:60px;text-align:center;opacity:0;transition:opacity .15s}
.qr-cell img{width:52px;height:52px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;display:block;margin:0 auto}

/* ── MOBILE CARDS ── */
@media(min-width:640px){
  .toolbar-inner{flex-direction:row;align-items:center}
  .sw{min-width:280px}
  .frow{flex-wrap:nowrap}
}
@media(max-width:639px){
  .hdr-stds{display:none}
  .hdr-inner{height:52px;gap:8px}
  .hdr-name{font-size:.85rem}
  .stats-inner{gap:0}
  .stat{padding:8px 10px;min-width:60px}
  .stat b{font-size:1.1rem}
  .chips{padding:8px 12px;gap:5px}
  .toolbar{padding:8px 12px}
  .rbar{padding:5px 12px}
  .main{padding:10px 10px 48px}
  /* hide table on mobile, show cards */
  table{display:none}
  .doc-cards{display:block}
  .cat-hdr{padding:11px 14px}
  .cat-body{padding:8px 10px;display:none;border-top:1px solid var(--border)}
  .cat-sec.open .cat-body{display:block}
}
@media(min-width:640px){
  .doc-cards{display:none}
}

/* ── DOC CARD (mobile) ── */
.doc-card{
  background:var(--white);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px;
}
.doc-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.doc-card-title{font-size:.88rem;font-weight:600;color:var(--ink);line-height:1.35;flex:1}
.doc-card-title a{color:inherit;text-decoration:none}
.doc-card-title a:hover{color:var(--blue)}
.doc-card-qr img{width:56px;height:56px;border-radius:6px;border:1px solid var(--border2);flex-shrink:0;cursor:pointer}
.doc-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.doc-card-code{font-family:var(--mono);font-size:.68rem;color:var(--ink3)}
.doc-card-clause{font-family:var(--mono);font-size:.68rem;color:var(--blue);font-weight:600}
</style>
</head>

const STD_BG={"9001":"#dbeafe","14001":"#dcfce7","45001":"#fef3c7","IMS":"#ede9fe","":"#f1f5f9"};
const STD_FG={"9001":"#1e40af","14001":"#166534","45001":"#92400e","IMS":"#5b21b6","":"#475569"};
const CAT_BG={"FRM":"#eff6ff","REG":"#f0fdf4","QSP":"#faf5ff","SOP":"#faf5ff","WI":"#fff7ed","POL":"#fdf4ff","PLN":"#f0f9ff","QMP":"#eef2ff","TRN":"#f0fdf4","LST":"#f8fafc","OH":"#fff1f2","EP":"#fff1f2","IAC":"#eef2ff","RR":"#fff1f2","QP":"#ecfeff"};
const CAT_FG={"FRM":"#1d4ed8","REG":"#15803d","QSP":"#7e22ce","SOP":"#7e22ce","WI":"#c2410c","POL":"#a21caf","PLN":"#0369a1","QMP":"#3730a3","TRN":"#15803d","LST":"#475569","OH":"#be123c","EP":"#be123c","IAC":"#3730a3","RR":"#be123c","QP":"#0e7490"};

let std="", sortKey="code";
const SORTS=["code","title","standard","clause"]; let si=0;

function toggleSort(){
  si=(si+1)%SORTS.length; sortKey=SORTS[si];
  document.getElementById("sortLbl").textContent="Sort: "+sortKey[0].toUpperCase()+sortKey.slice(1);
  go();
}
document.querySelectorAll("#chips .chip").forEach(c=>c.onclick=function(){
  std=this.dataset.s;
  document.querySelectorAll("#chips .chip").forEach(x=>x.classList.remove("on"));
  this.classList.add("on");
  document.getElementById("rstd").textContent=std?"Filtered: ISO "+std:"";
  go();
});
function filterClause(c){document.getElementById("fcl").value=c;go();}
function clearQ(){document.getElementById("q").value="";document.getElementById("xbtn").style.display="none";go();}
function reset(){
  std="";si=0;sortKey="code";
  document.getElementById("sortLbl").textContent="Sort: Code";
  document.querySelectorAll("#chips .chip").forEach((c,i)=>c.classList.toggle("on",i===0));
  ["q","fcl"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("xbtn").style.display="none";
  document.getElementById("rstd").textContent="";
  go();
}
function openQR(code,title,url){
  const m=document.getElementById("qrModal");
  document.getElementById("qrImg").src="data:image/png;base64,"+QR[code];
  document.getElementById("qrCode").textContent=code;
  document.getElementById("qrTitle").textContent=title;
  document.getElementById("qrUrl").textContent=url;
  m.classList.add("show");
}
function closeQR(e){
  if(e.target===document.getElementById("qrModal"))
    document.getElementById("qrModal").classList.remove("show");
}
function go(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  const cl=document.getElementById("fcl").value;
  document.getElementById("xbtn").style.display=q?"block":"none";
  let r=D.filter(d=>
    (!std||d.standard===std)&&(!cl||d.clause===cl)&&
    (!q||(d.code.toLowerCase().includes(q)||d.title.toLowerCase().includes(q)||d.clause.includes(q)))
  );
  r.sort((a,b)=>{
    let av=a[sortKey]||"",bv=b[sortKey]||"";
    if(sortKey==="clause"){const p=x=>x.split(".").map(n=>isNaN(n)?n:n.padStart(5,"0")).join(".");av=p(av);bv=p(bv);}
    return av<bv?-1:av>bv?1:0;
  });
  document.getElementById("rbar").textContent=r.length+" document"+(r.length!==1?"s":"");
  document.getElementById("sn").textContent=r.length;
  const groups={};
  r.forEach(d=>{(groups[d.cat_label]||(groups[d.cat_label]=[])).push(d);});
  const main=document.getElementById("main");
  if(!r.length){main.innerHTML='<div class="no-results">No documents match your filters.</div>';return;}
  main.innerHTML=Object.entries(groups).map(([cat,items])=>{
    const f=items[0];
    const rows=items.map(d=>`<tr>
      <td class="code-cell">${d.code}</td>
      <td class="title-cell"><a href="${d.url}" target="_blank">${d.title}</a></td>
      <td class="col-std"><span class="std-pill" style="background:${STD_BG[d.standard]||"#f1f5f9"};color:${STD_FG[d.standard]||"#475569"}">${d.standard||"—"}</span></td>
      <td class="clause-cell col-clause">${d.clause?`<a href="#" onclick="filterClause('${d.clause}');return false">§${d.clause}</a>`:"—"}</td>
      <td class="qr-cell">${QR[d.code]?`<img src="data:image/png;base64,${QR[d.code]}" alt="QR" title="Scan to open ${d.code}" onclick="openQR('${d.code}','${d.title.replace(/'/g,"\\'")}',${JSON.stringify(d.url)})">`:""}
      </td>
    </tr>`).join("");
    const cards=items.map(d=>`<div class="doc-card">
      <div class="doc-card-top">
        <div class="doc-card-title"><a href="${d.url}" target="_blank">${d.title}</a></div>
        ${QR[d.code]?`<div class="doc-card-qr"><img src="data:image/png;base64,${QR[d.code]}" alt="QR" onclick="openQR('${d.code}','${d.title.replace(/'/g,"\\'")}',${JSON.stringify(d.url)})"></div>`:""}
      </div>
      <div class="doc-card-meta">
        <span class="doc-card-code">${d.code}</span>
        <span class="std-pill" style="background:${STD_BG[d.standard]||"#f1f5f9"};color:${STD_FG[d.standard]||"#475569"}">${d.standard||"—"}</span>
        ${d.clause?`<span class="doc-card-clause">§${d.clause}</span>`:""}
      </div>
    </div>`).join("");
    return `<div class="cat-sec">
      <div class="cat-hdr" onclick="this.parentElement.classList.toggle('open')">
        <div class="cat-hdr-l">
          <span class="cat-pill" style="background:${CAT_BG[f.cat]||"#f1f5f9"};color:${CAT_FG[f.cat]||"#475569"}">${f.cat}</span>
          <span class="cat-name">${cat}</span>
          <span class="cat-n">${items.length}</span>
        </div>
        <span class="cat-arrow">▼</span>
      </div>
      <div class="cat-body">
        <table>
          <thead><tr>
            <th>Code</th><th>Title</th>
            <th class="col-std">Standard</th>
            <th class="col-clause">Clause</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="doc-cards">${cards}</div>
      </div>
    </div>`;
  }).join("");
}
go();
</script>
</body>
</html>
